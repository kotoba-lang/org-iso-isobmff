name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure and Kotoba (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-

      - name: Run tests
        run: clojure -M:test

      - name: Run lint
        run: clojure -M:lint

      - name: Compile bounded ISO-BMFF parser
        run: |
          mkdir -p target/kotoba
          clojure -M:kotoba compile test/isobmff/bounded_box_conformance.kotoba --source-path src \
            --target js-browser --output target/kotoba/isobmff.mjs
          clojure -M:kotoba compile test/isobmff/bounded_box_conformance.kotoba --source-path src \
            --target wasm32-browser --output target/kotoba/isobmff.wasm
      - name: Execute real fixture on Web and typed Wasm
        run: |
          compiler_src="$(clojure -Spath -M:kotoba | tr ':' '\n' | grep '/compiler/' | head -1)"
          node scripts/verify-kotoba.mjs target/kotoba/isobmff.mjs \
            target/kotoba/isobmff.wasm "$(dirname "$compiler_src")/runtime/browser-host.mjs" \
            resources/isobmff/fixtures/av_sample.mp4
