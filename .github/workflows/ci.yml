name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test
      - run: clojure -M:lint
      - name: Compile bounded ISO-BMFF parser
        run: |
          mkdir -p target/kotoba
          clojure -M:kotoba compile test/isobmff/bounded_box_conformance.kotoba --source-path src \
            --target js-browser --output target/kotoba/isobmff.mjs
          clojure -M:kotoba compile test/isobmff/bounded_box_conformance.kotoba --source-path src \
            --target wasm32-browser --output target/kotoba/isobmff.wasm
      - name: Execute real fixture on Web and typed Wasm
        run: |
          compiler_src="$(clojure -Spath -M:kotoba | tr ':' '\n' | grep '/compiler/' | head -1)"
          node scripts/verify-kotoba.mjs target/kotoba/isobmff.mjs \
            target/kotoba/isobmff.wasm "$(dirname "$compiler_src")/runtime/browser-host.mjs" \
            resources/isobmff/fixtures/av_sample.mp4
